<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mermaid Data Pipeline</title>
  <style>
    body {
      margin: 0;
      padding: 32px;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #1f2933;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 26px;
      font-weight: 700;
    }

    .mermaid {
      max-width: 1100px;
    }
  </style>
</head>
<body>
  <h1>E-commerce Visualization Pipeline</h1>
  <pre class="mermaid">
flowchart LR
    A[Raw Kaggle data] --> B[Normalize CSV]
    B --> C[Shared data loader]
    C --> D[Matplotlib PNG]
    C --> E[Plotly HTML/PNG]
    C --> F[Bokeh HTML]
    C --> G[Streamlit dashboard]
    C --> H[Dash dashboard]
    C --> I[Comparison report]
  </pre>
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: true, theme: 'default' });
  </script>
</body>
</html>
